name: CI/CD Pipeline - Node.js 
 
on: 
  push: 
    branches: ["main"] 
 
env: 
  REGISTRY: ghcr.io 
  IMAGE_NAME: ${{ github.repository }} 
 
jobs: 
 
  # ───────────────────────────────────────── 
  # JOB 1: Análisis de Calidad con SonarQube 
  # ───────────────────────────────────────── 
  sonarqube: 
    name: Análisis de Calidad de Código 
    runs-on: ubuntu-latest 
    steps: 
      - name: Clonación del repositorio (Checkout) 
        uses: actions/checkout@v4 
        with: 
          fetch-depth: 0 
 
      - name: Ejecución de Escáner SonarQube 
        uses: SonarSource/sonarqube-scan-action@master 
        env: 
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }} 
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL || 'http://34.51.47.110:9000/tutorials?id=mi-proyecto-gestion-sw' }} 
        with: 
          args: > 
            -Dsonar.projectKey=mi-proyecto-gestion-sw 
            -Dsonar.qualitygate.wait=true 
 
  # ───────────────────────────────────────── 
  # JOB 2: Prueba de Rendimiento con K6 
  # ───────────────────────────────────────── 
  k6-load-test: 
    name: Prueba de Rendimiento K6 
    runs-on: ubuntu-latest 
    needs: sonarqube 
    steps: 
      - name: Clonación del repositorio (Checkout) 
        uses: actions/checkout@v4 
 
      - name: Instalar K6 
        run: | 
          sudo gpg -k 
          sudo gpg --no-default-keyring \ 
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \ 
            --keyserver hkp://keyserver.ubuntu.com:80 \ 
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69 
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] \ 
            https://dl.k6.io/deb stable main" \ 
            | sudo tee /etc/apt/sources.list.d/k6.list 
          sudo apt-get update 
          sudo apt-get install k6 
 
      - name: Ejecutar prueba de carga K6 
        run: k6 run tests/load-test.js 
 
  # ───────────────────────────────────────── 
  # JOB 3: Build y Push a GHCR 
  # ───────────────────────────────────────── 
  build-and-push: 
    name: Empaquetado Docker 
    runs-on: ubuntu-latest 
    needs: k6-load-test 
    permissions: 
      contents: read 
      packages: write 
    steps: 
      - name: Clonación del repositorio (Checkout) 
        uses: actions/checkout@v4 
 
      - name: Login a GitHub Container Registry 
        uses: docker/login-action@v3 
        with: 
          registry: ${{ env.REGISTRY }} 
          username: ${{ github.actor }} 
          password: ${{ secrets.GITHUB_TOKEN }} 
 
      - name: Extraer metadata para Docker 
        id: meta 
        uses: docker/metadata-action@v5 
        with: 
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} 
          tags: | 
            type=sha,prefix=sha- 
            type=raw,value=main 
 
      - name: Build y Push imagen Docker 
        uses: docker/build-push-action@v5 
        with: 
          context: . 
          push: true 
          tags: ${{ steps.meta.outputs.tags }} 
          labels: ${{ steps.meta.outputs.labels }} 
 
  # ───────────────────────────────────────── 
  # JOB 4: Deploy al servidor cloud 
  # ───────────────────────────────────────── 
  deploy: 
    name: Despliegue Automático 
    runs-on: ubuntu-latest 
    needs: build-and-push 
    steps: 
      - name: Deploy via SSH 
        uses: appleboy/ssh-action@v1.0.3 
        with: 
          host: ${{ secrets.SERVER_HOST }} 
          username: ${{ secrets.SERVER_USER }} 
          key: ${{ secrets.SSH_PRIVATE_KEY }} 
          script: | 
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io \ 
              -u ${{ github.actor }} --password-stdin 
 
            docker stop my-node-app || true 
            docker rm   my-node-app || true 
 
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main 
 
            docker run -d \ 
              --name my-node-app \ 
              -p 80:3000 \ 
              --restart always \ 
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main 
 
            echo "Despliegue exitoso" 