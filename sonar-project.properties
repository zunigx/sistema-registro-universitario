sonar.projectKey=mi-proyecto-gestion-sw
sonar.projectName=Sistema Registro Universitario

# Fuentes a analizar (excluir carpeta de tests para evitar indexado doble)
sonar.sources=.
sonar.exclusions=node_modules/**,coverage/**,tests/**,*.json,*.md

# Carpeta de tests (disjunta de sonar.sources gracias a exclusions)
sonar.tests=tests
sonar.test.inclusions=tests/**/*.test.js

# Reporte de cobertura generado por Jest
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# client.js es código de navegador (no ejecutable por Jest), excluir de cobertura
sonar.coverage.exclusions=client.js

# Encoding
sonar.sourceEncoding=UTF-8
